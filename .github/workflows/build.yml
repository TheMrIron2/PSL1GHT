name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    env:
      PS3DEV: ${{ github.workspace }}/ps3dev
      PSL1GHT: ${{ github.workspace }}/psl1ght-install
      PS3TOOLCHAIN_DIR: ${{ github.workspace }}/ps3toolchain

    steps:
      - name: Checkout PSL1GHT
        uses: actions/checkout@v4

      - name: Install Ubuntu requirements
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            bison \
            bzip2 \
            clang \
            flex \
            g++ \
            gcc \
            libelf-dev \
            libgmp-dev \
            libncurses-dev \
            libssl-dev \
            libtool-bin \
            make \
            patch \
            pkg-config \
            python-is-python3 \
            python3-dev \
            python3-setuptools \
            subversion \
            texinfo \
            wget \
            zlib1g-dev

      - name: Install macOS requirements
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake bison flex gcc gmp libelf libtool ncurses openssl pkg-config texinfo wget zlib

      - name: Bootstrap ps3toolchain
        run: |
          make bootstrap-toolchain
          echo "$PS3DEV/bin" >> "$GITHUB_PATH"
          echo "$PS3DEV/ppu/bin" >> "$GITHUB_PATH"
          echo "$PS3DEV/spu/bin" >> "$GITHUB_PATH"

      - name: Check dependencies
        run: make check-deps

      - name: Build SDK
        run: |
          make install-ctrl
          make
          make install

      - name: Archive ps3dev toolchain
        if: github.event_name == 'workflow_dispatch'
        run: tar -czf ps3dev-${{ matrix.os }}.tar.gz ps3dev

      - name: Upload ps3dev toolchain artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ps3dev-${{ matrix.os }}
          path: ps3dev-${{ matrix.os }}.tar.gz
